---
layout: default
---

<main class="page-content" aria-label="Content">
  <div class="wrapper">

    <!-- ✅ Custom homepage header -->
    {% if page.url == "/" %}
      <div class="home-header" style="margin-bottom: 2rem;">
        <img src="{{ '/assets/images/homepage-header.jpg' | relative_url }}" 
             alt="Homepage header" 
             class="full-width-header">
      </div>
    {% endif %}

    {{ content }}
  </div>
</main>
